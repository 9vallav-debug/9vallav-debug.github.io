    <!-- Скрипт кнопки -->
    <script>
function generateExcel() {
        // 1. Исходные товары: Название, Количество, Цена
        const products = [
            ["Товар 1", 5, 1200],
            ["Товар 2", 2, 3400],
            ["Товар 3", 10, 450]
        ];

        // 2. Шапка таблицы (теперь добавляем колонку "Сумма")
        const data = [
            ["Название товара", "Количество", "Цена", "Сумма"]
        ];

        let totalSum = 0; // Переменная для подсчета общего итога

        // 3. Цикл, который перебирает товары и считает математику
        products.forEach(item => {
            const name = item[0];
            const quantity = item[1];
            const price = item[2];
            const rowSum = quantity * price; // Считаем сумму для этой строки
            
            totalSum += rowSum; // Добавляем в общую копилку

            // Кладем готовую строчку в таблицу
            data.push([name, quantity, price, rowSum]);
        });

        // 4. Добавляем финальную строку с общим итогом
        data.push([]); // Пустая строка для красоты
        data.push(["Итого", "", "", totalSum]);

        // 5. Стандартный код генерации и скачивания (его не меняем)
        const workbook = XLSX.utils.book_new();
        const worksheet = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(workbook, worksheet, "Данные");
        XLSX.writeFile(workbook, "Отчет_с_расчетом.xls");
    }
</body>
