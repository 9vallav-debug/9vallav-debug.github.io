<!DOCTYPE html>
<html>
<head>
    <title>Page Title</title>
    <!-- 1. Подключаем библиотеку для генерации корректно -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <h1>Hello, World!</h1>

    <!-- 2. Красивая зеленая кнопка -->
    <button onclick="generateExcel()" style="
        display: inline-block;
        padding: 10px 20px;
        background-color: #28a745;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        border: none;
        cursor: pointer;
    ">Скачать авто-отчет в Excel</button>

    <!-- 3. Сам скрипт, который создаст файл -->
    <script>
    function generateExcel() {
        const data = [
            ["Название товара", "Количество", "Цена"],
            ["Товар 1", 5, 1200],
            ["Товар 2", 2, 3400],
            ["Товар 3", 10, 450]
        ];

        const workbook = XLSX.utils.book_new();
        const worksheet = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(workbook, worksheet, "Данные");
        XLSX.writeFile(workbook, "Отчет.xlsx");
    }
    </script>

</body>
</html>
